<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>제휴 문의 | 더그아웃 데이터</title><link rel="stylesheet" href="assets/styles.css"></head><body><header class="site-header"><a class="brand" href="index.html">⚾ 더그아웃 데이터</a><nav><a href="about.html">사이트 소개</a><a href="privacy.html">개인정보처리방침</a></nav></header><main class="page"><p class="eyebrow">CONTACT</p><h1>제휴 문의</h1><p>데이터 공급, 콘텐츠 협업 또는 오류 제보 내용을 보내주세요.</p><form class="contact-form" id="contact" action="https://formspree.io/f/mykrpglb" method="POST"><label>담당자명 *<input name="name" autocomplete="name" required></label><label>이메일 *<input type="email" name="email" autocomplete="email" required></label><label>회사·단체명<input name="company" autocomplete="organization"></label><label>문의 내용 *<textarea name="message" required></textarea></label><label class="consent"><input type="checkbox" name="privacy_consent" value="동의" required><span><a href="privacy.html">개인정보처리방침</a>에 따른 수집 및 이용에 동의합니다. *</span></label><input type="text" name="_gotcha" hidden><button type="submit">문의 보내기</button><p class="status" role="status"></p></form></main><footer><div><strong>더그아웃 데이터</strong></div><p>© 2026 Dugout Data.</p></footer><script>const f=document.querySelector('#contact'),s=f.querySelector('.status'),b=f.querySelector('button');f.addEventListener('submit',async e=>{e.preventDefault();b.disabled=true;b.textContent='전송 중...';try{const r=await fetch(f.action,{method:'POST',body:new FormData(f),headers:{Accept:'application/json'}});if(!r.ok)throw 0;f.reset();s.className='status success';s.textContent='문의가 접수되었습니다.'}catch{s.className='status error';s.textContent='전송하지 못했습니다. 잠시 후 다시 시도해 주세요.'}finally{b.disabled=false;b.textContent='문의 보내기'}});</script></body></html>
